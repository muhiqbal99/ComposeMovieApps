name: Deploy to Firebase App Distribution

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/badges/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  distribute:
    name: Build & distribute debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > local.properties

      - name: Verify (detekt + unit tests)
        run: ./gradlew detekt testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Build release notes
        run: |
          {
            git log -1 --pretty=format:'%s'
            body="$(git log -1 --pretty=format:'%b')"
            if [ -n "$body" ]; then printf '\n\n%s' "$body"; fi
            printf '\n\n— %s @ %s' "${GITHUB_REF_NAME}" "$(git rev-parse --short HEAD)"
          } > release-notes.txt
          echo "Release notes:"; cat release-notes.txt

      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --groups "${{ vars.FIREBASE_TESTER_GROUPS || 'testers' }}" \
            --release-notes-file release-notes.txt
